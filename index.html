<!doctype html>
<html lang="en">

<head>
   <title>LemonCUC</title>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <style>
      * {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
      }

      html,
      body {
         height: 100%;
         font-family: system-ui, -apple-system, sans-serif;
         background: #1a1a2e;
         color: #eee;
      }

      /* ── VNC screen (hidden until connected) ── */
      #screen {
         width: 100%;
         height: 100%;
         display: none;
      }

      #screen.connected {
         display: block;
      }

      /* ── Connect dialog ── */
      .overlay {
         position: fixed;
         inset: 0;
         display: flex;
         align-items: center;
         justify-content: center;
         background: rgba(0, 0, 0, .6);
         backdrop-filter: blur(6px);
         z-index: 100;
         transition: opacity .25s;
      }

      .overlay.hidden {
         opacity: 0;
         pointer-events: none;
      }

      .dialog {
         background: #16213e;
         border: 1px solid #0f3460;
         border-radius: 12px;
         padding: 2rem;
         width: min(400px, 90vw);
         box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
      }

      .dialog h2 {
         margin-bottom: 1.5rem;
         font-size: 1.25rem;
         font-weight: 600;
      }

      .field {
         margin-bottom: 1rem;
      }

      .field label {
         display: block;
         font-size: .85rem;
         margin-bottom: .35rem;
         color: #a8a8b3;
      }

      .field input {
         width: 100%;
         padding: .6rem .8rem;
         border: 1px solid #0f3460;
         border-radius: 6px;
         background: #1a1a2e;
         color: #eee;
         font-size: .95rem;
         outline: none;
         transition: border-color .2s;
      }

      .field input:focus {
         border-color: #e94560;
      }

      .field input::placeholder {
         color: #555;
      }

      .error-msg {
         color: #e94560;
         font-size: .85rem;
         min-height: 1.2em;
         margin-bottom: .5rem;
      }

      .btn {
         width: 100%;
         padding: .7rem;
         border: none;
         border-radius: 6px;
         background: #e94560;
         color: #fff;
         font-size: 1rem;
         font-weight: 600;
         cursor: pointer;
         transition: background .2s;
      }

      .btn:hover {
         background: #c73650;
      }

      .btn:disabled {
         opacity: .5;
         cursor: not-allowed;
      }

      /* ── Floating toolbar (shown when connected) ── */
      #toolbar {
         position: fixed;
         top: 8px;
         right: 8px;
         display: none;
         gap: 6px;
         z-index: 50;
      }

      #toolbar.connected {
         display: flex;
      }

      #toolbar button {
         padding: 6px 12px;
         border: 1px solid #333;
         border-radius: 4px;
         background: rgba(22, 33, 62, .85);
         color: #eee;
         font-size: .8rem;
         cursor: pointer;
      }

      #toolbar button:hover {
         background: #0f3460;
      }
   </style>
   <script type="module" src="./src/main.ts"></script>
</head>

<body>
   <!-- Connect dialog -->
   <div id="connect-overlay" class="overlay">
      <div class="dialog">
         <h2>Connect to VNC</h2>
         <form id="connect-form">
            <div class="field">
               <label for="ws-url">WebSocket URL</label>
               <input id="ws-url" type="text" placeholder="ws://localhost:6080/websockify" required
                  value="ws://localhost:6080/websockify">
            </div>
            <div class="field">
               <label for="ws-audio-url">Audio WebSocket URL <small>(optional)</small></label>
               <input id="ws-audio-url" type="text" placeholder="ws://localhost:5702/websockify">
            </div>
            <div class="field">
               <label for="ws-password">Password <small>(optional)</small></label>
               <input id="ws-password" type="password" placeholder="VNC password">
            </div>
            <div id="connect-error" class="error-msg"></div>
            <button id="connect-btn" class="btn" type="submit">Connect</button>
         </form>
      </div>
   </div>

   <!-- Floating toolbar -->
   <div id="toolbar">
      <button id="btn-fullscreen">Fullscreen</button>
      <button id="btn-paste">Paste</button>
      <button id="btn-cad">Ctrl+Alt+Del</button>
      <button id="btn-disconnect">Disconnect</button>
   </div>

   <!-- VNC canvas target -->
   <div id="screen"></div>
</body>

</html>
