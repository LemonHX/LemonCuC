<!doctype html>
<html lang="en">

<head>
   <title>LemonCUC</title>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="./src/style.css">
   <script type="module" src="./src/main.ts"></script>
</head>

<body>
   <!-- ── Connect dialog ── -->
   <div id="connect-overlay" class="overlay">
      <div class="dialog">
         <h2>LemonCUC</h2>
         <form id="connect-form">
            <div class="field">
               <label for="ws-host">Backend Host</label>
               <input id="ws-host" type="text" placeholder="localhost:6080" required value="localhost:6080">
            </div>
            <div class="field">
               <label for="ws-password">VNC Password <small>(optional)</small></label>
               <input id="ws-password" type="password" placeholder="VNC password">
            </div>
            <div id="connect-error" class="error-msg"></div>
            <button id="connect-btn" class="btn" type="submit">Connect</button>
         </form>
      </div>
   </div>

   <!-- ── Main layout ── -->
   <div id="main" class="main hidden">
      <!-- Left: VNC -->
      <div id="left-panel">
         <div id="vnc-toolbar">
            <button id="btn-fullscreen" title="Fullscreen">全屏</button>
            <button id="btn-paste" title="Paste clipboard">粘贴内容</button>
            <button id="btn-openapi" title="OpenAPI Spec">API</button>
            <button id="btn-keybindings" title="Keybindings">键位</button>
            <button id="btn-disconnect" title="Disconnect">关闭</button>
         </div>
         <div id="screen"></div>
      </div>

      <!-- Resize handle -->
      <div id="resize-handle"></div>

      <!-- Right: Terminal tabs -->
      <div id="right-panel">
         <div id="term-tab-bar">
            <div id="term-tabs"></div>
            <button id="btn-new-tab" title="New terminal tab">+</button>
         </div>
         <div id="term-container"></div>
      </div>
   </div>

   <!-- Keybindings modal -->
   <div id="keybindings-modal" class="modal-overlay hidden">
      <div class="modal-content">
         <button id="btn-close-keybindings" class="modal-close">✕</button>
         <iframe id="keybindings-iframe" src="/keybindings.html"></iframe>
      </div>
   </div>

   <!-- Paste modal -->
   <div id="paste-modal" class="modal-overlay hidden">
      <div class="modal-content paste-modal-content">
         <h3>Paste to VNC</h3>
         <textarea id="paste-textarea" placeholder="Paste or type text here..."></textarea>
         <div class="paste-actions">
            <button id="btn-paste-send" class="btn">Send</button>
            <button id="btn-paste-cancel" class="btn btn-secondary">Cancel</button>
         </div>
      </div>
   </div>
</body>

</html>
